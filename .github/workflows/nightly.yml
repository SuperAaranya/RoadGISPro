name: roadgis-nightly

on:
  push:
    branches:
      - main

jobs:
  build-nightly:
    name: Build nightly ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            artifact_name: RoadGISPro-nightly-windows
            artifact_path: installer/windows-exe/out/RoadGISProSetup-nightly.exe
          - label: macOS
            os: macos-latest
            artifact_name: RoadGISPro-nightly-macos
            artifact_path: installer/macos-pyinstaller/out/RoadGISPro-nightly-macos.zip
          - label: Linux
            os: ubuntu-latest
            artifact_name: RoadGISPro-nightly-linux
            artifact_path: installer/linux-pyinstaller/out/RoadGISPro-nightly-linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev,3d]

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        run: choco install innosetup -y

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pwsh .\installer\windows-exe\build_exe.ps1 -Version "0.0.0" -RepoRoot "${{ github.workspace }}"
          $out = "installer\\windows-exe\\out"
          $exe = Get-ChildItem $out -Filter "RoadGISProSetup-*.exe" | Select-Object -First 1
          if (-not $exe) { throw "EXE not found in $out" }
          Copy-Item $exe.FullName "$out\\RoadGISProSetup-nightly.exe" -Force

      - name: Build macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x ./installer/macos-pyinstaller/build_app.sh
          ./installer/macos-pyinstaller/build_app.sh "nightly"

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd installer/macos-pyinstaller/out
          ditto -c -k --sequesterRsrc --keepParent RoadGISPro.app RoadGISPro-nightly-macos.zip

      - name: Build Linux app
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x ./installer/linux-pyinstaller/build_app.sh
          ./installer/linux-pyinstaller/build_app.sh "nightly"

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd installer/linux-pyinstaller/out
          tar -czf RoadGISPro-nightly-linux.tar.gz RoadGISPro

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Publish nightly release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          body: Automated nightly build from ${{ github.sha }}
          append_body: true
          files: ${{ matrix.artifact_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
