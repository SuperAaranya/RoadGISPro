name: roadgis-nightly

on:
  push:
    branches: [main]

jobs:
  build-nightly:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          choco install innosetup -y
      - name: Build EXE installer
        shell: pwsh
        run: |
          pwsh .\installer\windows-exe\build_exe.ps1 -Version "0.0.0" -RepoRoot "${{ github.workspace }}"
          $out = "installer\\windows-exe\\out"
          $exe = Get-ChildItem $out -Filter "RoadGISProSetup-*.exe" | Select-Object -First 1
          if (-not $exe) { throw "EXE not found in $out" }
          Copy-Item $exe.FullName "$out\\RoadGISProSetup-nightly.exe" -Force
      - name: Compute hashes
        id: hash
        shell: pwsh
        run: |
          $newExe = "installer\\windows-exe\\out\\RoadGISProSetup-nightly.exe"
          $newHash = (Get-FileHash $newExe -Algorithm SHA256).Hash
          echo "new_hash=$newHash" >> $env:GITHUB_OUTPUT
      - name: Compare with existing nightly
        id: compare
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $assetUrl = ""
          try {
            $assetUrl = gh release view nightly --repo $repo --json assets -q ".assets[] | select(.name==\"RoadGISProSetup-nightly.exe\") | .url"
          } catch {
            $assetUrl = ""
          }
          if (-not $assetUrl) {
            echo "upload=true" >> $env:GITHUB_OUTPUT
            exit 0
          }
          gh api -H "Accept: application/octet-stream" $assetUrl -o existing.exe
          $oldHash = (Get-FileHash existing.exe -Algorithm SHA256).Hash
          $newHash = "${{ steps.hash.outputs.new_hash }}"
          if ($oldHash -ne $newHash) {
            echo "upload=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "upload=false" >> $env:GITHUB_OUTPUT
          }
      - name: Publish nightly release
        if: steps.compare.outputs.upload == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          body: Automated nightly build from ${{ github.sha }}
          files: |
            installer/windows-exe/out/RoadGISProSetup-nightly.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
